<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMERADAR · 競廠遊戲追蹤</title>

<style>
:root {
  --bg:         #0f0f11;
  --surface:    #17171b;
  --surface2:   #1e1e24;
  --border:     #2a2a34;
  --border2:    #3a3a48;
  --text:       #e8e8f0;
  --text2:      #8888a0;
  --text3:      #55556a;
  --accent:     #7c6aff;
  --accent-dim: #3d3480;
  --accent-bg:  #1a1730;
  --green:      #3ecf8e;
  --green-bg:   #0d2b1f;
  --green-dim:  #1a5c3c;
  --amber:      #f0a040;
  --amber-bg:   #2b1e08;
  --red:        #ff6b6b;
  --red-bg:     #2b0f0f;
  --mono:       'IBM Plex Mono', monospace;
  --sans:       'Noto Sans TC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
body { min-height: 100vh; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── topbar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 54px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  gap: 12px; flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: .06em; }
.logo span { color: var(--text2); font-weight: 400; }
.pill {
  font-size: 11px; font-family: var(--mono); padding: 2px 8px;
  border-radius: 4px; border: 1px solid var(--border2); color: var(--text2);
}
.topbar-right { display: flex; gap: 8px; align-items: center; }
.btn {
  height: 32px; padding: 0 14px; font-size: 12px; font-family: var(--sans);
  border-radius: 6px; border: 1px solid var(--border2);
  background: transparent; color: var(--text); cursor: pointer;
  transition: background .15s; white-space: nowrap;
}
.btn:hover { background: var(--surface2); }
.btn-accent { background: var(--accent-bg); border-color: var(--accent-dim); color: var(--accent); }
.btn-accent:hover { background: var(--accent-dim); }

/* ── stats ── */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat { background: var(--bg); padding: 14px 28px; }
.stat-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 5px; }
.stat-val { font-size: 28px; font-weight: 500; font-family: var(--mono); }
.c-accent { color: var(--accent); }
.c-green  { color: var(--green); }
.c-amber  { color: var(--amber); }

/* ── tabs ── */
.tabs {
  display: flex; align-items: flex-end; gap: 2px;
  padding: 10px 24px 0; background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0;
}
.tab-btn {
  height: 36px; padding: 0 16px; font-size: 12px; font-family: var(--sans);
  border: none; border-bottom: 2px solid transparent;
  background: transparent; color: var(--text2); cursor: pointer;
  transition: color .15s, border-color .15s; white-space: nowrap;
  border-radius: 4px 4px 0 0;
}
.tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.tab-btn.tab-new { color: var(--green); }
.tab-btn.tab-new.active { border-bottom-color: var(--green); font-weight: 500; }
.tab-cnt {
  display: inline-block; font-family: var(--mono); font-size: 10px;
  padding: 1px 5px; border-radius: 10px; margin-left: 4px;
  background: var(--surface2); color: var(--text3);
}
.tab-btn.active .tab-cnt { background: var(--accent-bg); color: var(--accent); }
.tab-btn.tab-new.active .tab-cnt { background: var(--green-bg); color: var(--green); }

/* ── toolbar ── */
.toolbar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  padding: 12px 24px; background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 300px; }
.search-wrap::before {
  content: "⌕"; position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none;
}
.search-wrap input {
  width: 100%; height: 34px; padding: 0 10px 0 32px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; font-family: var(--sans); font-size: 13px; outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.toolbar select {
  height: 34px; padding: 0 10px; font-size: 12px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; font-family: var(--sans); outline: none; cursor: pointer;
}
.toolbar select:focus { border-color: var(--accent); }
.toolbar select option { background: var(--surface2); }
.result-info { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-left: auto; white-space: nowrap; }

/* ── table ── */
.tbl-outer { padding: 16px 24px 40px; overflow-x: auto; }
.tbl-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 960px; }
thead th {
  background: var(--surface); color: var(--text3);
  font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
  padding: 9px 12px; text-align: left;
  border-bottom: 1px solid var(--border); white-space: nowrap;
  position: sticky; top: 0; z-index: 1;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td { background: rgba(124,106,255,.04); }
tbody td { padding: 10px 12px; vertical-align: top; color: var(--text); }
.c-name    { min-width: 160px; max-width: 220px; }
.c-vendor  { min-width: 110px; white-space: nowrap; }
.c-date    { min-width: 88px; font-family: var(--mono); font-size: 12px; color: var(--text2); white-space: nowrap; }
.c-grid    { min-width: 88px; font-family: var(--mono); font-size: 12px; color: var(--text2); white-space: nowrap; }
.c-theme   { min-width: 90px; color: var(--text2); font-size: 12px; }
.c-feature { min-width: 160px; color: var(--text2); font-size: 12px; }
.c-vol     { min-width: 54px; white-space: nowrap; }
.c-num     { min-width: 70px; font-family: var(--mono); font-size: 12px; white-space: nowrap; }
.c-flag    { min-width: 44px; text-align: center; white-space: nowrap; }
.c-note    { font-size: 11px; color: var(--text3); max-width: 160px; }
a.game-link {
  color: var(--text); text-decoration: none;
  border-bottom: 1px dashed var(--border2);
  transition: color .15s, border-color .15s;
}
a.game-link:hover { color: var(--accent); border-color: var(--accent); }
.no-link { color: var(--text3); }
.rtp-val { color: var(--accent); }
.maxwin-val { color: var(--amber); }

/* ── badges ── */
.badge {
  display: inline-block; font-size: 11px; font-family: var(--mono);
  padding: 2px 7px; border-radius: 4px; border: 1px solid; font-weight: 500; white-space: nowrap;
}
.v-pp   { color: #a78bfa; border-color: #3d2f8a; background: #1a1330; }
.v-pg   { color: #60b8ff; border-color: #1a4a6b; background: #0d1f30; }
.v-jili { color: var(--green); border-color: var(--green-dim); background: var(--green-bg); }
.v-tada { color: #f472b6; border-color: #6b2248; background: #2b0f20; }
.v-fc   { color: var(--amber); border-color: #6b3a0a; background: var(--amber-bg); }
.v-jdb  { color: #fb923c; border-color: #6b2e0a; background: #2b1208; }
.vol-low   { color: var(--green);  border-color: var(--green-dim); background: var(--green-bg); }
.vol-mid   { color: var(--amber);  border-color: #6b3a0a;          background: var(--amber-bg); }
.vol-high  { color: #ff9f7a;       border-color: #6b2a10;          background: #2b1008; }
.vol-xhigh { color: var(--red);    border-color: #5a1a1a;          background: var(--red-bg); }
.new-tag   {
  color: var(--accent); border-color: var(--accent-dim); background: var(--accent-bg);
  margin-left: 6px; font-size: 9px; padding: 1px 5px;
  animation: pulse 2.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.flag-y { color: var(--green); font-weight: 600; font-family: var(--mono); }
.flag-n { color: var(--text3); font-family: var(--mono); }

/* ── empty ── */
.empty { text-align: center; padding: 56px 24px; color: var(--text2); font-size: 13px; }
.empty-icon { font-size: 28px; margin-bottom: 10px; opacity: .4; }

/* ── footer ── */
.footer {
  border-top: 1px solid var(--border);
  padding: 12px 28px; font-size: 11px; color: var(--text3); font-family: var(--mono);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
}

@media (max-width: 700px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .topbar, .tbl-outer, .tabs, .toolbar { padding-left: 14px; padding-right: 14px; }
}
</style>
</head>

const VENDOR_CLASS = {
  "Pragmatic Play":"v-pp","PG Soft":"v-pg","JILI Games":"v-jili",
  "Tada Gaming":"v-tada","Fa Chai Gaming":"v-fc","JDB Gaming":"v-jdb"
};
const VOL_CLASS = {"低":"vol-low","中":"vol-mid","高":"vol-high","極高":"vol-xhigh"};
const VENDORS_ORDER = ["Pragmatic Play","PG Soft","JILI Games","Tada Gaming","Fa Chai Gaming","JDB Gaming"];

function parseMaxwin(s) {
  if(!s) return 0;
  const m = s.match(/([\d.]+)/);
  return m ? parseFloat(m[1]) : 0;
}

let activeTab = "all";

document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab-btn");
  if(!btn) return;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeTab = btn.dataset.tab;
  render();
});

["search-box","filter-vol","filter-bf","filter-eb","sort-by"].forEach(id => {
  document.getElementById(id).addEventListener(id === "search-box" ? "input" : "change", render);
});

function getFiltered() {
  const q    = document.getElementById("search-box").value.toLowerCase().trim();
  const fvol = document.getElementById("filter-vol").value;
  const fbf  = document.getElementById("filter-bf").value;
  const feb  = document.getElementById("filter-eb").value;
  const sort = document.getElementById("sort-by").value;

  let arr = ALL_GAMES.filter(g => {
    if(activeTab === "new"  && !g._new) return false;
    if(activeTab !== "all" && activeTab !== "new" && g.vendor !== activeTab) return false;
    if(q && !(g.name + "|" + (g.feature||"") + "|" + (g.theme||"")).toLowerCase().includes(q)) return false;
    if(fvol && g.vol !== fvol) return false;
    if(fbf  && g.bf  !== fbf)  return false;
    if(feb  && g.eb  !== feb)  return false;
    return true;
  });

  if(sort === "date-desc")  arr.sort((a,b) => (b.date||"").localeCompare(a.date||""));
  else if(sort === "date-asc") arr.sort((a,b) => (a.date||"").localeCompare(b.date||""));
  else if(sort === "vendor") arr.sort((a,b) => {
    const ai = VENDORS_ORDER.indexOf(a.vendor), bi = VENDORS_ORDER.indexOf(b.vendor);
    return (ai<0?99:ai)-(bi<0?99:bi) || (b.date||"").localeCompare(a.date||"");
  });
  else if(sort === "name")   arr.sort((a,b) => a.name.localeCompare(b.name));
  else if(sort === "maxwin") arr.sort((a,b) => parseMaxwin(b.maxwin)-parseMaxwin(a.maxwin));
  return arr;
}

function esc(s) {
  if(s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function flagCell(v) {
  if(v==="Y") return '<span class="flag-y">✓</span>';
  if(v==="N") return '<span class="flag-n">✗</span>';
  return '<span class="flag-n">—</span>';
}

function render() {
  const arr   = getFiltered();
  const tbody = document.getElementById("tbl-body");
  const empty = document.getElementById("empty-state");
  document.getElementById("result-info").textContent = arr.length + " / 39 款";

  if(arr.length === 0) { tbody.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  tbody.innerHTML = arr.map(g => {
    const vc   = VENDOR_CLASS[g.vendor] || "";
    const volc = VOL_CLASS[g.vol] || "";
    const newTag  = g._new ? '<span class="badge new-tag">NEW</span>' : "";
    const nameCell = g.url
      ? `<a class="game-link" href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.name)}</a>`
      : `<span class="no-link">${esc(g.name)}</span>`;
    return `<tr>
      <td class="c-name">${nameCell}${newTag}</td>
      <td class="c-vendor"><span class="badge ${vc}">${esc(g.vendor||"—")}</span></td>
      <td class="c-date">${esc(g.date)||"—"}</td>
      <td class="c-grid">${esc(g.grid)||"—"}</td>
      <td class="c-theme">${esc(g.theme)||"—"}</td>
      <td class="c-feature">${esc(g.feature)||"—"}</td>
      <td class="c-vol">${g.vol ? `<span class="badge ${volc}">${g.vol}</span>` : "—"}</td>
      <td class="c-num rtp-val">${esc(g.rtp)||"—"}</td>
      <td class="c-num maxwin-val">${esc(g.maxwin)||"—"}</td>
      <td class="c-flag">${flagCell(g.eb)}</td>
      <td class="c-flag">${flagCell(g.bf)}</td>
      <td class="c-note">${esc(g.note)||""}</td>
    </tr>`;
  }).join("");
}

function exportCSV() {
  const arr = getFiltered();
  const headers = ["遊戲名稱","SlotCatalog連結","廠商","上架日期","盤面結構","主題風格","機制特色","波動性","RTP","Max Win","Extra Bet","Buy Feature","備註"];
  const rows = arr.map(g =>
    [g.name,g.url,g.vendor,g.date,g.grid,g.theme,g.feature,g.vol,g.rtp,g.maxwin,g.eb,g.bf,g.note]
      .map(v => `"${(v||"").replace(/"/g,'""')}"`)
      .join(",")
  );
  const csv = "\uFEFF" + [headers.join(","), ...rows].join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = "gameradar_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
}

render();
